name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Syntax check
        run: |
          python -m py_compile app.py worker.py job_store.py scripts/create_user.py
      - name: Run unit tests
        run: |
          pytest -q
