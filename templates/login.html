<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LocaGed OCR - Connexion</title>
    <style>
      :root {
        color-scheme: light;
        --bg0: #0b1220;
        --bg1: #0f1b33;
        --card: rgba(255, 255, 255, 0.92);
        --text: #0f172a;
        --muted: #5b6b86;
        --primary: #2563eb;
        --primary2: #1d4ed8;
        --danger: #dc2626;
        --shadow: 0 18px 50px rgba(2, 6, 23, 0.35);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        min-height: 100vh;
        color: var(--text);
        background: radial-gradient(1200px 700px at 20% 0%, rgba(37, 99, 235, 0.35), transparent 55%),
          radial-gradient(900px 600px at 90% 20%, rgba(16, 185, 129, 0.18), transparent 55%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border-radius: 14px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        box-shadow: var(--shadow);
        padding: 28px;
        backdrop-filter: blur(10px);
      }
      .logo {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 700;
        text-align: center;
        letter-spacing: -0.02em;
      }
      .subtitle {
        margin: 0 0 20px;
        color: var(--muted);
        text-align: center;
      }
      .field {
        margin-bottom: 14px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid rgba(15, 23, 42, 0.14);
        border-radius: 10px;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.9);
      }
      button {
        width: 100%;
        margin-top: 8px;
        padding: 11px 14px;
        border: 0;
        border-radius: 10px;
        color: #fff;
        background: linear-gradient(180deg, var(--primary), var(--primary2));
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.25);
      }
      .error {
        margin-bottom: 12px;
        padding: 10px;
        border-radius: 8px;
        background: #fde8e7;
        color: var(--danger);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 class="logo">LocaGed</h1>
        <p class="subtitle">OCR multi-langues (fra, ara, eng)</p>
        {% if error_message %}
        <div class="error">{{ error_message }}</div>
        {% endif %}
        <form method="post" action="/login">
          <div class="field">
            <label for="username">Nom d'utilisateur</label>
            <input id="username" name="username" type="text" required />
          </div>
          <div class="field">
            <label for="password">Mot de passe</label>
            <input id="password" name="password" type="password" required />
          </div>
          <button type="submit">Connexion</button>
        </form>
      </div>
    </div>
  </body>
  </html>
